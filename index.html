<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4f8;
      font-family: 'Georgia', serif;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #2d3748;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    /* ── Session bar ── */
    .session-bar {
      background: #fff;
      border-radius: 16px;
      padding: 16px 20px;
      max-width: 500px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .session-bar h2 {
      font-size: 0.85rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .session-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .session-row label {
      font-size: 0.9rem;
      color: #4a5568;
      white-space: nowrap;
    }

    .session-bar select,
    .session-bar input[type="text"] {
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #2d3748;
      background: #f7fafc;
    }

    .viewers-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .viewer-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #4a5568;
      cursor: pointer;
      background: #f7fafc;
      user-select: none;
    }

    .viewer-chip.selected {
      background: #4a7c59;
      color: #fff;
      border-color: #4a7c59;
    }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: 500px;
      margin: 0 auto 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #2d3748;
      background: #fff;
    }

    .filter-chip {
      padding: 6px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #4a5568;
      cursor: pointer;
      background: #fff;
      user-select: none;
    }

    .filter-chip.active { background: #2d3748; color: #fff; border-color: #2d3748; }

    /* ── Form ── */
    .add-form {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto 40px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .add-form h2 {
      font-size: 1rem;
      color: #4a5568;
      letter-spacing: 0.05em;
    }

    .side-section {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-section h3 {
      font-size: 0.85rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .add-form input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: #2d3748;
      background: #f7fafc;
    }

    .photo-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px dashed #a0aec0;
      border-radius: 10px;
      cursor: pointer;
      color: #718096;
      font-size: 0.95rem;
    }

    .photo-label input[type="file"] { display: none; }

    .photo-preview {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 10px;
      display: none;
    }

    .remove-photo {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: left;
      padding: 0;
      display: none;
    }

    .form-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: #4a7c59;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .btn-save:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-save:active:not(:disabled) { background: #2d5016; }

    .btn-cancel {
      padding: 12px 20px;
      background: #e2e8f0;
      color: #4a5568;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      display: none;
    }

    .btn-cancel:active { background: #cbd5e0; }

    /* ── Cards grid ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card-scene {
      width: 280px;
      height: 360px;
      perspective: 900px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      border-radius: 16px;
    }

    .card-scene.flipped .card { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card-face-1 { background: #2d3748; }
    .card-face-2 {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #2d5016, #4a7c59);
    }

    .card-face img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0;
    }

    .card-face .card-text {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      line-height: 1.3;
    }

    .card-face.has-both img { opacity: 0.45; }

    /* ── Card meta (owner, subject) ── */
    .card-meta {
      font-size: 0.75rem;
      color: #a0aec0;
      text-align: center;
    }

    /* ── Card actions ── */
    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-edit, .btn-delete {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-edit   { background: #e2e8f0; color: #2d3748; }
    .btn-delete { background: #fed7d7; color: #c53030; }
    .btn-edit:active   { background: #cbd5e0; }
    .btn-delete:active { background: #feb2b2; }

    /* ── Progress dot ── */
    .progress-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      cursor: pointer;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .progress-dot.red    { background: #fc8181; border-color: #c53030; }
    .progress-dot.yellow { background: #f6e05e; border-color: #b7791f; }
    .progress-dot.green  { background: #68d391; border-color: #276749; }

    .hint {
      margin-top: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: #a0aec0;
      letter-spacing: 0.05em;
    }

    .status {
      text-align: center;
      font-size: 0.8rem;
      color: #a0aec0;
      min-height: 1.2em;
    }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <h1>Flashcards</h1>

  <!-- Session bar -->
  <div class="session-bar">
    <h2>Mina olen</h2>
    <div class="session-row">
      <select id="session-name" onchange="onNameChange()">
        <option value="">-- Vali nimi --</option>
        <option>Tahti</option>
        <option>Hele</option>
        <option>Saara</option>
        <option>Liisi</option>
      </select>
    </div>

    <h2>Teema</h2>
    <div class="session-row">
      <select id="subject-select" onchange="onSubjectSelectChange()">
        <option value="">-- Vali või lisa uus --</option>
      </select>
      <input type="text" id="subject-input" placeholder="Uus teema..." style="flex:1;min-width:120px;" oninput="onSubjectInput()" />
    </div>

    <h2>Nähtav</h2>
    <div class="viewers-row" id="viewers-row">
      <div class="viewer-chip" data-name="Tahti" onclick="toggleViewer(this)">Tahti</div>
      <div class="viewer-chip" data-name="Hele" onclick="toggleViewer(this)">Hele</div>
      <div class="viewer-chip" data-name="Saara" onclick="toggleViewer(this)">Saara</div>
      <div class="viewer-chip" data-name="Liisi" onclick="toggleViewer(this)">Liisi</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <select id="filter-subject" onchange="applyFilters()">
      <option value="">Kõik teemad</option>
    </select>
    <div class="filter-chip active" id="filter-unlearned" onclick="toggleProgressFilter()">Õppimata</div>
  </div>

  <!-- Add form -->
  <div class="add-form">
    <h2 id="form-title">Lisa uus kaart</h2>

    <div class="side-section">
      <h3>Külg 1</h3>
      <input type="text" id="s1-text" placeholder="Tekst rida 1 (valikuline)" />
      <input type="text" id="s1-text2" placeholder="Tekst rida 2 (valikuline)" />
      <label class="photo-label">
        📷 Vali foto
        <input type="file" id="s1-photo" accept="image/*" />
      </label>
      <img id="s1-preview" class="photo-preview" alt="" />
      <button class="remove-photo" id="s1-remove" onclick="removePhoto(1)">✕ Eemalda foto</button>
    </div>

    <div class="side-section">
      <h3>Külg 2</h3>
      <input type="text" id="s2-text" placeholder="Tekst rida 1 (valikuline)" />
      <input type="text" id="s2-text2" placeholder="Tekst rida 2 (valikuline)" />
      <label class="photo-label">
        📷 Vali foto
        <input type="file" id="s2-photo" accept="image/*" />
      </label>
      <img id="s2-preview" class="photo-preview" alt="" />
      <button class="remove-photo" id="s2-remove" onclick="removePhoto(2)">✕ Eemalda foto</button>
    </div>

    <p class="status" id="status"></p>

    <div class="form-buttons">
      <button class="btn-save" id="btn-submit" onclick="submitForm()">Lisa kaart</button>
      <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()">Tühista</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>
  <div class="empty-msg" id="empty-msg" style="display:none">Kaarte ei leitud.</div>

  <p class="hint">Klõpsa kaardil, et pöörata</p>
  <p style="text-align:center;margin-top:16px;">
    <button onclick="shuffle()" style="background:none;border:none;color:#4a7c59;font-size:0.85rem;cursor:pointer;text-decoration:underline;">Sega kaardid</button>
  </p>

  <script>
    var API = 'https://flashcards-server-v3oq.onrender.com';
    var NAMES = ['Tahti', 'Hele', 'Saara', 'Liisi'];

    var cards = [];
    var editingId = null;
    var pendingFiles = { 1: null, 2: null };
    var pendingRemoved = { 1: false, 2: false };
    var showOnlyUnlearned = true;

    // ── Session state (persisted in localStorage) ──
    var session = JSON.parse(localStorage.getItem('fc-session') || 'null') || {
      name: '',
      subject: '',
      viewers: []
    };

    function saveSession() {
      localStorage.setItem('fc-session', JSON.stringify(session));
    }

    function onNameChange() {
      session.name = document.getElementById('session-name').value;
      // auto-select self as viewer
      if (session.name && session.viewers.indexOf(session.name) === -1) {
        session.viewers.push(session.name);
      }
      saveSession();
      renderViewerChips();
      loadCards();
      loadSubjects();
    }

    function onSubjectSelectChange() {
      var val = document.getElementById('subject-select').value;
      if (val) {
        document.getElementById('subject-input').value = '';
        session.subject = val;
        saveSession();
      }
    }

    function onSubjectInput() {
      var val = document.getElementById('subject-input').value.trim();
      if (val) {
        document.getElementById('subject-select').value = '';
        session.subject = val;
        saveSession();
      }
    }

    function toggleViewer(chip) {
      var name = chip.dataset.name;
      var idx = session.viewers.indexOf(name);
      if (idx === -1) {
        session.viewers.push(name);
        chip.classList.add('selected');
      } else {
        // don't remove self
        if (name === session.name) return;
        session.viewers.splice(idx, 1);
        chip.classList.remove('selected');
      }
      saveSession();
    }

    function renderViewerChips() {
      var chips = document.querySelectorAll('.viewer-chip');
      chips.forEach(function(chip) {
        var name = chip.dataset.name;
        if (session.viewers.indexOf(name) !== -1) {
          chip.classList.add('selected');
        } else {
          chip.classList.remove('selected');
        }
      });
    }

    // ── Restore session UI ──
    function restoreSession() {
      if (session.name) document.getElementById('session-name').value = session.name;
      if (session.subject) document.getElementById('subject-input').value = session.subject;
      renderViewerChips();
    }

    // ── Subjects ──
    async function loadSubjects() {
      if (!session.name) return;
      try {
        var res = await fetch(API + '/subjects?viewer=' + encodeURIComponent(session.name));
        var subjects = await res.json();
        var sel = document.getElementById('subject-select');
        var filterSel = document.getElementById('filter-subject');
        sel.innerHTML = '<option value="">-- Vali või lisa uus --</option>';
        filterSel.innerHTML = '<option value="">Kõik teemad</option>';
        subjects.forEach(function(s) {
          sel.innerHTML += '<option value="' + s + '">' + s + '</option>';
          filterSel.innerHTML += '<option value="' + s + '">' + s + '</option>';
        });
        if (session.subject) sel.value = session.subject;
      } catch(e) {}
    }

    // ── Load cards ──
    async function loadCards() {
      if (!session.name) return;
      try {
        var url = API + '/cards?viewer=' + encodeURIComponent(session.name);
        var res = await fetch(url);
        cards = await res.json();
        applyFilters();
      } catch (e) {
        setStatus('Serveriga ühendamine ebaõnnestus.');
      }
    }

    function applyFilters() {
      var subjectFilter = document.getElementById('filter-subject').value;
      var filtered = cards.filter(function(c) {
        if (subjectFilter && c.subject !== subjectFilter) return false;
        if (showOnlyUnlearned) {
          var progress = c.progress && c.progress[session.name];
          if (progress === 'green') return false;
        }
        return true;
      });
      renderCards(filtered);
    }

    function toggleProgressFilter() {
      showOnlyUnlearned = !showOnlyUnlearned;
      var chip = document.getElementById('filter-unlearned');
      chip.classList.toggle('active', showOnlyUnlearned);
      chip.textContent = showOnlyUnlearned ? 'Õppimata' : 'Kõik';
      applyFilters();
    }

    // ── Status / busy ──
    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function setBusy(busy) {
      document.getElementById('btn-submit').disabled = busy;
      setStatus(busy ? 'Palun oota...' : '');
    }

    // ── Photo inputs ──
    function setupPhotoInput(side) {
      document.getElementById('s' + side + '-photo').addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;
        pendingFiles[side] = file;
        pendingRemoved[side] = false;
        var preview = document.getElementById('s' + side + '-preview');
        var removeBtn = document.getElementById('s' + side + '-remove');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        removeBtn.style.display = 'block';
      });
    }

    setupPhotoInput(1);
    setupPhotoInput(2);

    function removePhoto(side) {
      pendingFiles[side] = null;
      pendingRemoved[side] = true;
      document.getElementById('s' + side + '-preview').src = '';
      document.getElementById('s' + side + '-preview').style.display = 'none';
      document.getElementById('s' + side + '-remove').style.display = 'none';
      document.getElementById('s' + side + '-photo').value = '';
    }

    async function uploadPhoto(file) {
      var formData = new FormData();
      formData.append('image', file);
      var res = await fetch(API + '/upload', { method: 'POST', body: formData });
      var data = await res.json();
      if (!data.url) throw new Error('Upload failed');
      return data.url;
    }

    // ── Submit ──
    async function submitForm() {
      if (!session.name) { alert('Vali kõigepealt oma nimi.'); return; }
      var subject = document.getElementById('subject-input').value.trim() || document.getElementById('subject-select').value;
      if (!subject) { alert('Vali või lisa teema.'); return; }

      var s1text  = document.getElementById('s1-text').value.trim();
      var s1text2 = document.getElementById('s1-text2').value.trim();
      var s2text  = document.getElementById('s2-text').value.trim();
      var s2text2 = document.getElementById('s2-text2').value.trim();

      if (!s1text && !s1text2 && !pendingFiles[1] && !s2text && !s2text2 && !pendingFiles[2]) {
        alert('Palun täida vähemalt üks väli.');
        return;
      }

      setBusy(true);

      try {
        var existingCard = editingId ? cards.find(function(c) { return c._id === editingId; }) : null;

        async function resolvePhoto(side) {
          if (pendingFiles[side]) return await uploadPhoto(pendingFiles[side]);
          if (pendingRemoved[side]) return null;
          return existingCard ? existingCard['s' + side].photo : null;
        }

        var entry = {
          owner: session.name,
          viewers: session.viewers.slice(),
          subject: subject,
          progress: existingCard ? existingCard.progress || {} : {},
          s1: { text: s1text, text2: s1text2, photo: await resolvePhoto(1) },
          s2: { text: s2text, text2: s2text2, photo: await resolvePhoto(2) }
        };

        if (editingId) {
          await fetch(API + '/cards/' + editingId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry)
          });
          editingId = null;
        } else {
          await fetch(API + '/cards/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry)
          });
        }

        resetForm();
        await loadCards();
        await loadSubjects();
      } catch (e) {
        setStatus('Viga: ' + e.message);
      } finally {
        setBusy(false);
      }
    }

    // ── Edit ──
    function editCard(id) {
      var c = cards.find(function(c) { return c._id === id; });
      if (!c) return;
      editingId = id;
      pendingFiles = { 1: null, 2: null };
      pendingRemoved = { 1: false, 2: false };

      document.getElementById('s1-text').value  = c.s1.text || '';
      document.getElementById('s1-text2').value = c.s1.text2 || '';
      document.getElementById('s2-text').value  = c.s2.text || '';
      document.getElementById('s2-text2').value = c.s2.text2 || '';

      [1, 2].forEach(function(side) {
        var photo = c['s' + side].photo;
        var preview = document.getElementById('s' + side + '-preview');
        var removeBtn = document.getElementById('s' + side + '-remove');
        if (photo) {
          preview.src = photo;
          preview.style.display = 'block';
          removeBtn.style.display = 'block';
        } else {
          preview.src = '';
          preview.style.display = 'none';
          removeBtn.style.display = 'none';
        }
      });

      document.getElementById('form-title').textContent = 'Muuda kaarti';
      document.getElementById('btn-submit').textContent = 'Salvesta';
      document.getElementById('btn-cancel').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() { editingId = null; resetForm(); }

    function resetForm() {
      ['s1-text','s1-text2','s2-text','s2-text2'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
      document.getElementById('s1-photo').value = '';
      document.getElementById('s2-photo').value = '';
      pendingFiles = { 1: null, 2: null };
      pendingRemoved = { 1: false, 2: false };

      [1, 2].forEach(function(side) {
        document.getElementById('s' + side + '-preview').src = '';
        document.getElementById('s' + side + '-preview').style.display = 'none';
        document.getElementById('s' + side + '-remove').style.display = 'none';
      });

      document.getElementById('form-title').textContent = 'Lisa uus kaart';
      document.getElementById('btn-submit').textContent = 'Lisa kaart';
      document.getElementById('btn-cancel').style.display = 'none';
      setStatus('');
    }

    // ── Delete ──
    async function deleteCard(id) {
      if (!confirm('Kustuta kaart?')) return;
      try {
        await fetch(API + '/cards/' + id, { method: 'DELETE' });
        if (editingId === id) { editingId = null; resetForm(); }
        await loadCards();
      } catch (e) {
        setStatus('Kustutamine ebaõnnestus.');
      }
    }

    // ── Progress ──
    var COLORS = [null, 'red', 'yellow', 'green'];

    async function cycleProgress(id) {
      var card = cards.find(function(c) { return c._id === id; });
      if (!card) return;
      var current = (card.progress && card.progress[session.name]) || null;
      var idx = COLORS.indexOf(current);
      var next = COLORS[(idx + 1) % COLORS.length];

      // optimistic update
      if (!card.progress) card.progress = {};
      card.progress[session.name] = next;
      applyFilters();

      try {
        await fetch(API + '/cards/' + id + '/progress', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: session.name, color: next })
        });
      } catch(e) {}
    }

    // ── Render ──
    function makeFace(side, faceNum) {
      var face = document.createElement('div');
      face.className = 'card-face card-face-' + faceNum;

      var hasPhoto = !!side.photo;
      var hasText  = !!(side.text || side.text2);
      if (hasPhoto && hasText) face.classList.add('has-both');

      if (hasPhoto) {
        var img = document.createElement('img');
        img.src = side.photo;
        img.alt = side.text || '';
        face.appendChild(img);
      }

      if (hasText) {
        var txt = document.createElement('div');
        txt.className = 'card-text';
        if (side.text) {
          var line1 = document.createElement('div');
          line1.textContent = side.text;
          txt.appendChild(line1);
        }
        if (side.text2) {
          var line2 = document.createElement('div');
          line2.style.fontSize = '1.1rem';
          line2.style.fontWeight = 'normal';
          line2.style.marginTop = '8px';
          line2.style.opacity = '0.85';
          line2.textContent = side.text2;
          txt.appendChild(line2);
        }
        face.appendChild(txt);
      }

      if (!hasPhoto && !hasText) {
        var empty = document.createElement('div');
        empty.className = 'card-text';
        empty.style.opacity = '0.3';
        empty.textContent = '?';
        face.appendChild(empty);
      }

      return face;
    }

    function renderCards(filtered) {
      var list = filtered || cards;
      var container = document.getElementById('cards');
      container.innerHTML = '';
      document.getElementById('empty-msg').style.display = list.length === 0 ? 'block' : 'none';

      list.forEach(function(card) {
        var wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';

        var scene = document.createElement('div');
        scene.className = 'card-scene';
        scene.addEventListener('click', function() { this.classList.toggle('flipped'); });

        var inner = document.createElement('div');
        inner.className = 'card';
        inner.appendChild(makeFace(card.s1, 1));
        inner.appendChild(makeFace(card.s2, 2));
        scene.appendChild(inner);

        // meta
        var meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.textContent = (card.subject || '') + (card.owner ? ' · ' + card.owner : '');

        // actions
        var actions = document.createElement('div');
        actions.className = 'card-actions';

        // progress dot
        var dot = document.createElement('div');
        dot.className = 'progress-dot';
        var color = card.progress && card.progress[session.name];
        if (color) dot.classList.add(color);
        dot.title = 'Vaheta progress';
        dot.addEventListener('click', (function(id) {
          return function() { cycleProgress(id); };
        })(card._id));

        var editBtn = document.createElement('button');
        editBtn.className = 'btn-edit';
        editBtn.textContent = 'Muuda';
        editBtn.addEventListener('click', (function(id) {
          return function() { editCard(id); };
        })(card._id));

        var deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-delete';
        deleteBtn.textContent = 'Kustuta';
        deleteBtn.addEventListener('click', (function(id) {
          return function() { deleteCard(id); };
        })(card._id));

        actions.appendChild(dot);
        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);

        wrapper.appendChild(scene);
        wrapper.appendChild(meta);
        wrapper.appendChild(actions);
        container.appendChild(wrapper);
      });
    }

    function shuffle() {
      for (var i = cards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = cards[i]; cards[i] = cards[j]; cards[j] = tmp;
      }
      applyFilters();
    }

    // ── Init ──
    restoreSession();
    if (session.name) {
      loadCards();
      loadSubjects();
    }
  </script>

</body>
</html>
