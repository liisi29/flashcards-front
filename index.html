<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loomade nimed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4f8;
      font-family: 'Georgia', serif;
      padding: 32px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #2d3748;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    /* ── Form ── */
    .add-form {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto 40px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .add-form h2 {
      font-size: 1rem;
      color: #4a5568;
      letter-spacing: 0.05em;
    }

    .side-section {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .side-section h3 {
      font-size: 0.85rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .add-form input[type="text"],
    .add-form textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: #2d3748;
      background: #f7fafc;
    }

    .add-form textarea {
      resize: vertical;
      min-height: 60px;
    }

    .photo-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px dashed #a0aec0;
      border-radius: 10px;
      cursor: pointer;
      color: #718096;
      font-size: 0.95rem;
    }

    .photo-label input[type="file"] {
      display: none;
    }

    .photo-preview {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 10px;
      display: none;
    }

    .remove-photo {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: left;
      padding: 0;
      display: none;
    }

    .form-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: #4a7c59;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .btn-save:active { background: #2d5016; }

    .btn-cancel {
      padding: 12px 20px;
      background: #e2e8f0;
      color: #4a5568;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      display: none;
    }

    .btn-cancel:active { background: #cbd5e0; }

    /* ── Cards grid ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card-scene {
      width: 280px;
      height: 360px;
      perspective: 900px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
      -webkit-transition: -webkit-transform 0.6s ease;
      transition: transform 0.6s ease;
      border-radius: 16px;
    }

    .card-scene.flipped .card {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .card-face-1 { background: #2d3748; }
    .card-face-2 {
      -webkit-transform: rotateY(180deg) translateZ(0);
      transform: rotateY(180deg) translateZ(0);
      background: linear-gradient(135deg, #2d5016, #4a7c59);
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0;
    }

    .card-face .card-text {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      line-height: 1.3;
    }

    /* when there's both photo and text, dim the photo */
    .card-face.has-both img {
      opacity: 0.45;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-edit, .btn-delete {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-edit   { background: #e2e8f0; color: #2d3748; }
    .btn-delete { background: #fed7d7; color: #c53030; }
    .btn-edit:active   { background: #cbd5e0; }
    .btn-delete:active { background: #feb2b2; }

    .hint {
      margin-top: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: #a0aec0;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <h1>Loomade nimed</h1>
  <p style="text-align:center;font-size:0.75rem;color:#a0aec0;margin-top:-24px;margin-bottom:24px;">v8</p>

  <div class="add-form">
    <h2 id="form-title">Lisa uus kaart</h2>

    <div class="side-section">
      <h3>Külg 1</h3>
      <input type="text" id="s1-text" placeholder="Tekst rida 1 (valikuline)" />
      <input type="text" id="s1-text2" placeholder="Tekst rida 2 (valikuline)" />
      <label class="photo-label">
        📷 Vali foto
        <input type="file" id="s1-photo" accept="image/*" />
      </label>
      <img id="s1-preview" class="photo-preview" alt="" />
      <button class="remove-photo" id="s1-remove" onclick="removePhoto(1)">✕ Eemalda foto</button>
    </div>

    <div class="side-section">
      <h3>Külg 2</h3>
      <input type="text" id="s2-text" placeholder="Tekst rida 1 (valikuline)" />
      <input type="text" id="s2-text2" placeholder="Tekst rida 2 (valikuline)" />
      <label class="photo-label">
        📷 Vali foto
        <input type="file" id="s2-photo" accept="image/*" />
      </label>
      <img id="s2-preview" class="photo-preview" alt="" />
      <button class="remove-photo" id="s2-remove" onclick="removePhoto(2)">✕ Eemalda foto</button>
    </div>

    <div class="form-buttons">
      <button class="btn-save" id="btn-submit" onclick="submitForm()">Lisa kaart</button>
      <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()">Tühista</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <p class="hint">Klõpsa kaardil, et pöörata</p>
  <p style="text-align:center;margin-top:16px;">
    <button onclick="clearPhotos()" style="background:none;border:none;color:#e53e3e;font-size:0.75rem;cursor:pointer;text-decoration:underline;">Eemalda kõik fotod</button>
    &nbsp;·&nbsp;
    <button onclick="clearAll()" style="background:none;border:none;color:#a0aec0;font-size:0.75rem;cursor:pointer;text-decoration:underline;">Kustuta kõik andmed</button>
  </p>

  <script>
    var DEFAULT_ANIMALS = [
      {
        s1: { text: '', text2: '', photo: null },
        s2: { text: 'gorilla', text2: 'Kesk-Aafrika vihmametsad', photo: null }
      },
      {
        s1: { text: '', text2: '', photo: null },
        s2: { text: 'tiiger', text2: 'Aasia metsad ja rohtlad', photo: null }
      }
    ];

    function load() {
      var saved = localStorage.getItem('flashcards-v2');
      return saved ? JSON.parse(saved) : DEFAULT_ANIMALS;
    }

    function save() {
      try {
        localStorage.setItem('flashcards-v2', JSON.stringify(cards));
      } catch(e) {
        alert('Salvestamine ebaõnnestus – mälu täis. Proovi fotosid eemaldada.');
      }
    }

    var cards = load();
    var editingIndex = -1;
    var pendingPhotos = { 1: null, 2: null };

    function compressImage(dataURL, callback) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var MAX = 800;
        var w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = dataURL;
    }

    function setupPhotoInput(side) {
      document.getElementById('s' + side + '-photo').addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          compressImage(e.target.result, function(compressed) {
            pendingPhotos[side] = compressed;
            var preview = document.getElementById('s' + side + '-preview');
            var removeBtn = document.getElementById('s' + side + '-remove');
            preview.src = compressed;
            preview.style.display = 'block';
            removeBtn.style.display = 'block';
          });
        };
        reader.readAsDataURL(file);
      });
    }

    setupPhotoInput(1);
    setupPhotoInput(2);

    function removePhoto(side) {
      pendingPhotos[side] = null;
      var preview = document.getElementById('s' + side + '-preview');
      var removeBtn = document.getElementById('s' + side + '-remove');
      preview.src = '';
      preview.style.display = 'none';
      removeBtn.style.display = 'none';
      document.getElementById('s' + side + '-photo').value = '';
      // mark as explicitly removed when editing
      if (editingIndex >= 0) {
        pendingPhotos[side] = '__removed__';
      }
    }

    function submitForm() {
      var s1text  = document.getElementById('s1-text').value.trim();
      var s1text2 = document.getElementById('s1-text2').value.trim();
      var s2text  = document.getElementById('s2-text').value.trim();
      var s2text2 = document.getElementById('s2-text2').value.trim();

      if (!s1text && !s1text2 && !pendingPhotos[1] && !s2text && !s2text2 && !pendingPhotos[2]) {
        alert('Palun täida vähemalt üks väli.');
        return;
      }

      function resolvePhoto(side, existing) {
        if (pendingPhotos[side] === '__removed__') return null;
        if (pendingPhotos[side]) return pendingPhotos[side];
        return existing || null;
      }

      var existingS1Photo = editingIndex >= 0 ? cards[editingIndex].s1.photo : null;
      var existingS2Photo = editingIndex >= 0 ? cards[editingIndex].s2.photo : null;

      var entry = {
        s1: { text: s1text, text2: s1text2, photo: resolvePhoto(1, existingS1Photo) },
        s2: { text: s2text, text2: s2text2, photo: resolvePhoto(2, existingS2Photo) }
      };

      if (editingIndex >= 0) {
        cards[editingIndex] = entry;
        editingIndex = -1;
      } else {
        cards.push(entry);
      }

      save();
      resetForm();
      renderCards();
    }

    function editCard(i) {
      var c = cards[i];
      editingIndex = i;
      pendingPhotos = { 1: null, 2: null };

      document.getElementById('s1-text').value  = c.s1.text;
      document.getElementById('s1-text2').value = c.s1.text2 || '';
      document.getElementById('s2-text').value  = c.s2.text;
      document.getElementById('s2-text2').value = c.s2.text2 || '';

      function loadPreview(side, photo) {
        var preview = document.getElementById('s' + side + '-preview');
        var removeBtn = document.getElementById('s' + side + '-remove');
        if (photo) {
          preview.src = photo;
          preview.style.display = 'block';
          removeBtn.style.display = 'block';
        } else {
          preview.src = '';
          preview.style.display = 'none';
          removeBtn.style.display = 'none';
        }
      }

      loadPreview(1, c.s1.photo);
      loadPreview(2, c.s2.photo);

      document.getElementById('form-title').textContent = 'Muuda kaarti';
      document.getElementById('btn-submit').textContent = 'Salvesta';
      document.getElementById('btn-cancel').style.display = 'block';

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      editingIndex = -1;
      resetForm();
    }

    function resetForm() {
      document.getElementById('s1-text').value  = '';
      document.getElementById('s1-text2').value = '';
      document.getElementById('s2-text').value  = '';
      document.getElementById('s2-text2').value = '';
      document.getElementById('s1-photo').value = '';
      document.getElementById('s2-photo').value = '';
      pendingPhotos = { 1: null, 2: null };

      [1, 2].forEach(function(side) {
        var preview = document.getElementById('s' + side + '-preview');
        var removeBtn = document.getElementById('s' + side + '-remove');
        preview.src = '';
        preview.style.display = 'none';
        removeBtn.style.display = 'none';
      });

      document.getElementById('form-title').textContent = 'Lisa uus kaart';
      document.getElementById('btn-submit').textContent = 'Lisa kaart';
      document.getElementById('btn-cancel').style.display = 'none';
    }

    function deleteCard(i) {
      if (!confirm('Kustuta kaart?')) return;
      cards.splice(i, 1);
      if (editingIndex === i) { editingIndex = -1; resetForm(); }
      save();
      renderCards();
    }

    function makeFace(side) {
      var face = document.createElement('div');
      face.className = 'card-face card-face-' + side;

      var hasPhoto = !!side.photo;
      var hasText  = !!(side.text || side.text2);

      if (hasPhoto && hasText) face.classList.add('has-both');

      if (hasPhoto) {
        var img = document.createElement('img');
        img.src = side.photo;
        img.alt = side.text || '';
        face.appendChild(img);
      }

      if (hasText || side.text2) {
        var txt = document.createElement('div');
        txt.className = 'card-text';
        if (side.text) {
          var line1 = document.createElement('div');
          line1.textContent = side.text;
          txt.appendChild(line1);
        }
        if (side.text2) {
          var line2 = document.createElement('div');
          line2.style.fontSize = '1.1rem';
          line2.style.fontWeight = 'normal';
          line2.style.marginTop = '8px';
          line2.style.opacity = '0.85';
          line2.textContent = side.text2;
          txt.appendChild(line2);
        }
        face.appendChild(txt);
      }

      if (!hasPhoto && !hasText) {
        var empty = document.createElement('div');
        empty.className = 'card-text';
        empty.style.opacity = '0.3';
        empty.textContent = '?';
        face.appendChild(empty);
      }

      return face;
    }

    function renderCards() {
      var container = document.getElementById('cards');
      container.innerHTML = '';

      cards.forEach(function(card, i) {
        var wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';

        var scene = document.createElement('div');
        scene.className = 'card-scene';
        scene.addEventListener('click', function() {
          this.classList.toggle('flipped');
        });

        var inner = document.createElement('div');
        inner.className = 'card';

        var face1 = makeFace(card.s1);
        face1.className = 'card-face card-face-1' + (card.s1.photo && card.s1.text ? ' has-both' : '');

        var face2 = makeFace(card.s2);
        face2.className = 'card-face card-face-2' + (card.s2.photo && card.s2.text ? ' has-both' : '');

        inner.appendChild(face1);
        inner.appendChild(face2);
        scene.appendChild(inner);

        var actions = document.createElement('div');
        actions.className = 'card-actions';

        var editBtn = document.createElement('button');
        editBtn.className = 'btn-edit';
        editBtn.textContent = 'Muuda';
        editBtn.addEventListener('click', (function(idx) {
          return function() { editCard(idx); };
        })(i));

        var deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-delete';
        deleteBtn.textContent = 'Kustuta';
        deleteBtn.addEventListener('click', (function(idx) {
          return function() { deleteCard(idx); };
        })(i));

        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);
        wrapper.appendChild(scene);
        wrapper.appendChild(actions);
        container.appendChild(wrapper);
      });
    }

    function clearAll() {
      if (!confirm('Kustuta kõik kaardid ja andmed?')) return;
      localStorage.removeItem('flashcards-v2');
      cards = DEFAULT_ANIMALS.slice();
      save();
      renderCards();
    }

    function clearPhotos() {
      if (!confirm('Eemalda kõik fotod kaartidelt? Tekst jääb alles.')) return;
      cards.forEach(function(c) {
        c.s1.photo = null;
        c.s2.photo = null;
      });
      save();
      renderCards();
    }

    renderCards();
  </script>

</body>
</html>
