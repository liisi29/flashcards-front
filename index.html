<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Welcome screen -->
  <div class="welcome" id="welcome">
    <h1>Flashcards</h1>
    <div class="welcome-box">
      <div>
        <label>Kes sa oled?</label>
        <div class="name-chips">
          <div class="name-chip" data-name="Tahti" onclick="selectName(this)">Tahti</div>
          <div class="name-chip" data-name="Hele" onclick="selectName(this)">Hele</div>
          <div class="name-chip" data-name="Saara" onclick="selectName(this)">Saara</div>
          <div class="name-chip" data-name="Liisi" onclick="selectName(this)">Liisi</div>
        </div>
      </div>
      <div>
        <label>Mida õpid?</label>
        <select id="welcome-subject-select" onchange="onWelcomeSubjectSelect()">
          <option value="">-- Vali teema --</option>
        </select>
        <input type="text" id="welcome-subject-input" placeholder="või kirjuta uus teema..." style="margin-top:10px;" oninput="onWelcomeSubjectInput()" />
      </div>
      <div class="welcome-actions" id="welcome-actions" style="display:none">
        <button class="btn-welcome-action" onclick="enterApp()">✏️ Lisa kaarte</button>
        <button class="btn-welcome-action btn-welcome-learn" onclick="enterLearn()">📖 Õpi</button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <h1>Flashcards</h1>

    <!-- Top bar -->
    <div class="top-bar">
      <span class="user-label" id="user-label"></span>
      <button class="btn-change-user" onclick="changeUser()">Vaheta kasutajat</button>
    </div>

    <!-- Session bar -->
    <div class="session-bar">
      <h2>Salvestan teemasse</h2>
      <div class="session-row">
        <input type="text" id="subject-input" placeholder="Teema..." style="flex:1;" oninput="onSubjectInput()" />
      </div>

      <h2>Nähtav</h2>
      <div class="viewers-row">
        <div class="viewer-chip" data-name="Tahti" onclick="toggleViewer(this)">Tahti</div>
        <div class="viewer-chip" data-name="Hele" onclick="toggleViewer(this)">Hele</div>
        <div class="viewer-chip" data-name="Saara" onclick="toggleViewer(this)">Saara</div>
        <div class="viewer-chip" data-name="Liisi" onclick="toggleViewer(this)">Liisi</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <select id="filter-subject" onchange="applyFilters()">
        <option value="">Kõik teemad</option>
      </select>
    </div>

    <!-- Add/edit form -->
    <div class="add-form">
      <h2 id="form-title">Lisa uus kaart</h2>

      <div class="side-section">
        <h3>Külg 1</h3>
        <input type="text" id="s1-text" placeholder="Tekst rida 1 (valikuline)" />
        <input type="text" id="s1-text2" placeholder="Tekst rida 2 (valikuline)" />
        <label class="photo-label">
          📷 Vali foto
          <input type="file" id="s1-photo" accept="image/*" />
        </label>
        <img id="s1-preview" class="photo-preview" alt="" />
        <button class="remove-photo" id="s1-remove" onclick="removePhoto(1)">✕ Eemalda foto</button>
      </div>

      <div class="side-section">
        <h3>Külg 2</h3>
        <input type="text" id="s2-text" placeholder="Tekst rida 1 (valikuline)" />
        <input type="text" id="s2-text2" placeholder="Tekst rida 2 (valikuline)" />
        <label class="photo-label">
          📷 Vali foto
          <input type="file" id="s2-photo" accept="image/*" />
        </label>
        <img id="s2-preview" class="photo-preview" alt="" />
        <button class="remove-photo" id="s2-remove" onclick="removePhoto(2)">✕ Eemalda foto</button>
      </div>

      <p class="status" id="status"></p>

      <div class="form-buttons">
        <button class="btn-save" id="btn-submit" onclick="submitForm()">Lisa kaart</button>
        <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()">Tühista</button>
      </div>
    </div>

    <!-- Cards -->
    <div class="cards" id="cards"></div>
    <div class="empty-msg" id="empty-msg" style="display:none">Kaarte ei leitud.</div>

    <p class="hint">Klõpsa kaardil, et pöörata</p>
    <p style="text-align:center;margin-top:16px;">
      <button onclick="shuffle()" style="background:none;border:none;color:#4a7c59;font-size:0.85rem;cursor:pointer;text-decoration:underline;">Sega kaardid</button>
      &nbsp;·&nbsp;
      <button onclick="openLearnConfig()" style="background:none;border:none;color:#4a7c59;font-size:0.85rem;cursor:pointer;text-decoration:underline;">Õpi</button>
    </p>

  </div><!-- /app -->

  <!-- Learning mode config -->
  <div class="learn-overlay" id="learn-config" style="display:none">
    <div class="learn-config-box">
      <h2>Õpirežiim</h2>

      <div class="learn-config-row">
        <label>Teema</label>
        <select id="learn-subject">
          <option value="">Kõik teemad</option>
        </select>
      </div>

      <div class="learn-config-row">
        <label>Vaade</label>
        <div class="learn-progress-checks">
          <label class="progress-check"><input type="radio" name="learn-view" id="learn-view-one" checked /> 1 kaart korraga</label>
          <label class="progress-check"><input type="radio" name="learn-view" id="learn-view-all" /> Kõik korraga</label>
        </div>
      </div>

      <div class="learn-config-row">
        <label>Juhuslik järjekord?</label>
        <input type="checkbox" id="learn-random" checked />
      </div>

      <div class="learn-config-row">
        <label>Millised kaardid?</label>
        <div class="learn-progress-checks">
          <label class="progress-check"><input type="checkbox" id="lp-none" checked /> ⬜ Märkimata</label>
          <label class="progress-check"><input type="checkbox" id="lp-red" checked /> 🔴 Ei tea</label>
          <label class="progress-check"><input type="checkbox" id="lp-yellow" checked /> 🟡 Natuke tean</label>
          <label class="progress-check"><input type="checkbox" id="lp-green" /> 🟢 Tean</label>
        </div>
      </div>

      <div class="learn-config-buttons">
        <button class="btn-save" onclick="startLearning()">Alusta</button>
        <button class="btn-cancel" style="display:block" onclick="closeLearnConfig()">✕ Välju</button>
      </div>
    </div>
  </div>

  <!-- Learning mode grid -->
  <div class="learn-overlay" id="learn-grid" style="display:none;flex-direction:column;overflow-y:auto;justify-content:flex-start;padding-top:24px;">
    <div class="learn-top" style="position:sticky;top:0;background:#1a202c;padding:12px 0;z-index:1;">
      <button class="btn-learn-exit" onclick="document.getElementById('learn-grid').style.display='none';document.getElementById('learn-config').style.display='flex'">← Seaded</button>
      <span class="learn-counter" id="learn-grid-counter"></span>
    </div>
    <div class="cards" id="learn-grid-cards" style="padding:24px;"></div>
  </div>

  <!-- Learning mode -->
  <div class="learn-overlay" id="learn-mode" style="display:none">
    <div class="learn-top">
      <button class="btn-learn-exit" onclick="exitLearning()">← Seaded</button>
      <span class="learn-counter" id="learn-counter"></span>
    </div>
    <div class="learn-card-area">
      <div class="card-scene" id="learn-scene" onclick="this.classList.toggle('flipped')">
        <div class="card" id="learn-card"></div>
      </div>
    </div>
    <div id="learn-progress-dot-wrap" style="display:flex;justify-content:center;gap:10px;">
      <div class="sem-dot sem-grey" id="lpd-none" onclick="setLearnProgress(null)" title="Märkimata"></div>
      <div class="sem-dot sem-red" id="lpd-red" onclick="setLearnProgress('red')" title="Ei tea"></div>
      <div class="sem-dot sem-yellow" id="lpd-yellow" onclick="setLearnProgress('yellow')" title="Natuke tean"></div>
      <div class="sem-dot sem-green" id="lpd-green" onclick="setLearnProgress('green')" title="Tean"></div>
    </div>
    <div class="learn-nav">
      <button class="btn-learn-nav" onclick="learnPrev()">&#8592;</button>
      <div class="learn-progress-dots" id="learn-dots"></div>
      <button class="btn-learn-nav" onclick="learnNext()">&#8594;</button>
    </div>
  </div>

  <!-- session-name hidden input needed by restoreSession -->
  <input type="hidden" id="session-name" />

  <script src="app.js"></script>
  <script src="welcome.js"></script>
  <script src="main.js"></script>
  <script src="learn.js"></script>
</body>
</html>
